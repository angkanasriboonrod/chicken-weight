<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>น้ำหนักไก่</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
    font-family: sans-serif;
    background:#e5e7eb;
    margin:0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:20px;
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:20px;
}

.top-form{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:15px;
}

.top-form input,
.top-form select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
    outline:none;
}

.top-form input:focus,
.top-form select:focus{
    border:1px solid #2563eb;
}

.summary{
    background:#2563eb;
    color:white;
    text-align:center;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}

.summary h2{
    margin:0;
    font-size:34px;
}

.summary p{
    margin:5px 0 0;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    color:white;
    padding:6px;
    font-size:12px;
}

td{
    border:1px solid #ddd;
    padding:3px;
    text-align:center;
    font-size:12px;
}

input.weight{
    width:90%;
    padding:4px;
    border:1px solid #ccc;
    border-radius:4px;
    text-align:center;
}

/* ซ่อน up/down */

input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
}

input[type=number]{
    -moz-appearance:textfield;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
}

button{
    border:none;
    padding:10px 16px;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
}

.pdf{
    background:#0ea5e9;
}

.print{
    background:#2563eb;
}

.clear{
    background:#dc2626;
}

/* พิมพ์ A4 */

@media print{

    @page{
        size:A4 portrait;
        margin:5mm;
    }

    body{
        zoom:65%;
        background:white;
    }

    .buttons{
        display:none;
    }

}

</style>
</head>

<body>

<div class="container" id="printArea">

<h1>น้ำหนักไก่</h1>

<div class="top-form">

    <input type="text" placeholder="ชื่อลูกค้า">

    <select>
        <option value="">สินค้า</option>
        <option>ไก่</option>
        </select>

    <input type="date">

    <input type="text" placeholder="เลขที่">

</div>

<div class="summary">
    <h2 id="totalWeight">0.00</h2>
    <p>น้ำหนักรวม (กิโลกรัม)</p>
</div>

<table>

<thead>
<tr>

<th>ลำดับ</th>
<th>น้ำหนัก (กิโลกรัม)</th>

<th>ลำดับ</th>
<th>น้ำหนัก (กิโลกรัม)</th>

<th>ลำดับ</th>
<th>น้ำหนัก (กิโลกรัม)</th>

<th>ลำดับ</th>
<th>น้ำหนัก (กิโลกรัม)</th>

<th>ลำดับ</th>
<th>น้ำหนัก (กิโลกรัม)</th>

</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="buttons">

<button class="pdf" onclick="downloadPDF()">
Export PDF
</button>

<button class="print" onclick="printPage()">
พิมพ์
</button>

<button class="clear" onclick="clearData()">
ล้างข้อมูล
</button>

</div>

</div>

<script>

const tableBody = document.getElementById("tableBody");

for(let i=1;i<=30;i++){

    let row = "<tr>";

    for(let col=0;col<5;col++){

        let number = i + (col*30);

        row += `

        <td>${number}</td>

        <td>

            <input
                type="number"
                class="weight"
                placeholder="0"
                step="0.01"
                oninput="calculate()"
                onkeydown="moveNext(event)"
            >

        </td>

        `;
    }

    row += "</tr>";

    tableBody.innerHTML += row;
}

function calculate(){

    const weights = document.querySelectorAll(".weight");

    let total = 0;

    weights.forEach(input => {

        const value = parseFloat(input.value);

        if(!isNaN(value)){
            total += value;
        }

    });

    document.getElementById("totalWeight").innerText =
    total.toLocaleString('en-US',{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });

}

function moveNext(event){

    if(event.key === "Enter"){

        event.preventDefault();

        const inputs = document.querySelectorAll(".weight");

        const index = Array.from(inputs).indexOf(event.target);

        const nextIndex = index + 5;

        if(nextIndex < inputs.length){

            inputs[nextIndex].focus();

        }

    }

}
function clearData(){

    const inputs = document.querySelectorAll(".weight");

    inputs.forEach(input => {
        input.value = "";
    });

    calculate();

}

function printPage(){

    setTimeout(() => {
        window.print();
    },300);

}

function downloadPDF(){

    const element = document.getElementById("printArea");

    const opt = {

        margin:0.2,
        filename:'chicken-weight.pdf',

        image:{
            type:'jpeg',
            quality:1
        },

        html2canvas:{
            scale:2
        },

        jsPDF:{
            unit:'in',
            format:'a4',
            orientation:'portrait'
        }

    };

    html2pdf().set(opt).from(element).save();

}

</script>

</body>
</html>

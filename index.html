<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1">

<title>น้ำหนักไก่</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    padding:0;

    background:#e5e7eb;

    font-family:sans-serif;

}

/* ===== A4 ===== */
#printArea{

    width:200mm;
    min-height:287mm;

    background:white;

    margin:auto;

    padding:3mm;

    overflow:hidden;

    display:flex;

    flex-direction:column;

}

/* ===== TITLE ===== */

h1{

    margin:0 0 8px 0;

    text-align:center;

    color:#2563eb;

    font-size:22px;

    flex-shrink:0;

}

/* ===== FORM ===== */

.top-form{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:6px;

    margin-bottom:6px;

    flex-shrink:0;

}

.top-form input,
.top-form select{

    width:100%;

    padding:6px;

    border:1px solid #ccc;

    border-radius:4px;

    font-size:12px;

}

/* ===== SUMMARY ===== */

.summary{

    background:#2563eb;

    color:white;

    border-radius:8px;

    text-align:center;

    padding:6px;

    margin-bottom:6px;

    flex-shrink:0;

}

.summary h2{

    margin:0;

    font-size:26px;

}

.summary p{

    margin:2px 0 0 0;

    font-size:12px;

}

/* ===== TABLE ===== */

table{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;

    flex:1;

}

/* ===== HEADER ===== */

th{

    background:#2563eb;

    color:white;

    border:1px solid #ddd;

    font-size:10px;

    padding:2px;

    height:22px;

}

/* ===== CELLS ===== */

td{

    border:1px solid #ddd;

    text-align:center;

    padding:1px;

    height:25px;

    font-size:10px;

}

/* ===== NUMBER COLUMN ===== */

th:nth-child(odd),
td:nth-child(odd){

    width:28px;

}

/* ===== INPUT ===== */

input.weight{

    width:98%;

    height:20px;

    border:1px solid #ccc;

    border-radius:3px;

    text-align:center;

    font-size:10px;

    padding:0;

}

/* ===== HIDE SPIN ===== */

input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{

    -webkit-appearance:none;
    margin:0;

}

input[type=number]{

    -moz-appearance:textfield;

}

/* ===== BUTTON ===== */

.buttons{

    margin:10px auto;

    display:flex;

    gap:10px;

    justify-content:center;

}

button{

    border:none;

    color:white;

    padding:10px 16px;

    border-radius:6px;

    cursor:pointer;

}

.pdf{
    background:#0ea5e9;
}

.print{
    background:#2563eb;
}

.clear{
    background:#dc2626;
}

/* ===== PRINT ===== */

@media print{

    @page{

        size:A4 portrait;
        margin:0;

    }

    body{

        background:white;

    }

    .buttons{

        display:none;

    }

}

</style>

</head>

<body>

<div id="printArea">

<h1>น้ำหนักไก่</h1>

<div class="top-form">

<input type="text" placeholder="ชื่อลูกค้า">

<select>

<option>ไก่ไข่</option>

</select>

<input type="date">

<input type="text" placeholder="เลขที่">

</div>

<div class="summary">

<h2 id="totalWeight">0.00</h2>

<p>น้ำหนักรวม (กิโลกรัม)</p>

</div>

<table>

<thead>

<tr>

<th>ลำดับ</th>
<th>น้ำหนัก</th>

<th>ลำดับ</th>
<th>น้ำหนัก</th>

<th>ลำดับ</th>
<th>น้ำหนัก</th>

<th>ลำดับ</th>
<th>น้ำหนัก</th>

<th>ลำดับ</th>
<th>น้ำหนัก</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="buttons">

<button
class="pdf"
onclick="downloadPDF()">

Export PDF

</button>

<button
class="print"
onclick="window.print()">

พิมพ์

</button>

<button
class="clear"
onclick="clearData()">

ล้างข้อมูล

</button>

</div>

<script>

const tableBody =
document.getElementById("tableBody");

/* ===== CREATE TABLE ===== */

for(let i=1;i<=30;i++){

    let row = "<tr>";

    for(let col=0;col<5;col++){

        const number =
        i + (col*30);

        row += `

        <td>${number}</td>

        <td>

        <input
        type="number"
        class="weight"
        step="0.01"
        oninput="calculate()"
        onkeydown="moveNext(event)">

        </td>

        `;

    }

    row += "</tr>";

    tableBody.innerHTML += row;

}

/* ===== CALCULATE ===== */

function calculate(){

    const weights =
    document.querySelectorAll(".weight");

    let total = 0;

    weights.forEach(input=>{

        const value =
        parseFloat(input.value);

        if(!isNaN(value)){

            total += value;

        }

    });

    document.getElementById("totalWeight")
    .innerText = total.toFixed(2);

}

/* ===== ENTER NEXT ===== */

function moveNext(event){

    if(event.key === "Enter"){

        event.preventDefault();

        const inputs =
        document.querySelectorAll(".weight");

        const index =
        Array.from(inputs)
        .indexOf(event.target);

        const nextIndex =
        index + 5;

        if(nextIndex < inputs.length){

            inputs[nextIndex].focus();

        }

    }

}

/* ===== CLEAR ===== */

function clearData(){

    document
    .querySelectorAll(".weight")
    .forEach(input=>{

        input.value = "";

    });

    calculate();

}

/* ===== EXPORT PDF ===== */

async function downloadPDF(){

    const element =
    document.getElementById("printArea");

    // ตรวจสอบขนาดก่อน export
    const rect =
    element.getBoundingClientRect();

    console.log("WIDTH:",rect.width);
    console.log("HEIGHT:",rect.height);

    const opt = {

        margin:0,

        filename:"chicken-weight.pdf",

        image:{
            type:"jpeg",
            quality:1
        },

        html2canvas:{

            scale:2.2,

            useCORS:true,

            scrollX:0,

            scrollY:0

        },

        jsPDF:{

            unit:"mm",

            format:"a4",

            orientation:"portrait"

        },

        pagebreak:{
            mode:[]
        }

    };

    await html2pdf()
    .set(opt)
    .from(element)
    .save();

}

</script>

</body>
</html>

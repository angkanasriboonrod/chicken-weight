<body>

<div class="container">

  <h1>น้ำหนักไก่</h1>

  <div class="top-form">
    <input type="text" placeholder="ชื่อลูกค้า">
    <input type="text" placeholder="สินค้า">
    <input type="date">
    <input type="text" placeholder="เลขที่">
  </div>

    <div class="summary">

  <div class="card">
    <h2 id="totalWeight">0</h2>
    <p>น้ำหนักรวม (กิโลกรัม)</p>
  </div>

</div>
<table>
  <thead>
    <tr>
      <th>ลำดับ</th>
      <th>น้ำหนัก (กิโลกรัม)</th>

      <th>ลำดับ</th>
      <th>น้ำหนัก (กิโลกรัม)</th>

      <th>ลำดับ</th>
      <th>น้ำหนัก (กิโลกรัม)</th>

      <th>ลำดับ</th>
      <th>น้ำหนัก (กิโลกรัม)</th>

      <th>ลำดับ</th>
      <th>น้ำหนัก (กิโลกรัม)</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>


  <div class="buttons">
    <button class="save" onclick="downloadPDF()">Export PDF</button>
    <button class="print" onclick="window.print()">พิมพ์</button>
    <button class="clear" onclick="clearData()">ล้างข้อมูล</button>

  </div>

</div>

<script>

const tableBody = document.getElementById("tableBody");
for(let i = 1; i <= 30; i++){

  let row = "<tr>";

  for(let col = 0; col < 5; col++){

    let number = i + (col * 30);

    row += `
      <td>${number}</td>

      <td>
        <input
          type="number"
          class="weight"
          placeholder="0"
          oninput="calculate()"
        >
      </td>
    `;
  }

  row += "</tr>";

  tableBody.innerHTML += row;
}

function calculate(){

  const weights = document.querySelectorAll(".weight");

  let total = 0;

  weights.forEach(input => {

    const value = parseFloat(input.value);

    if(!isNaN(value)){
      total += value;
    }

  });
document.getElementById("totalWeight").innerText =
  total.toLocaleString('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function clearData(){

  const weights = document.querySelectorAll(".weight");

  weights.forEach(input => {
    input.value = "";
  });

  calculate();

}

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
